name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: tutor
          POSTGRES_PASSWORD: tutor
          POSTGRES_DB: tutor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tutor -d tutor"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql+psycopg://tutor:tutor@localhost:5432/tutor

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint backend
        working-directory: backend
        run: python -m ruff check app tests scripts start.py alembic

      - name: Check backend formatting
        working-directory: backend
        run: python -m black --check app tests scripts start.py alembic

      - name: Type-check backend
        working-directory: backend
        run: python -m mypy app

      - name: Compile backend sources
        working-directory: backend
        run: python -m compileall app tests

      - name: Import FastAPI app
        working-directory: backend
        run: python -c "from app.main import app; print(app.title)"

      - name: Smoke-test Alembic migrations
        working-directory: backend
        run: python -m alembic upgrade head

      - name: Validate Tutor eval dataset
        working-directory: backend
        run: python -m scripts.evaluate_tutor_behavior --cases evals/tutor_cases.jsonl --json

      - name: Run backend tests with coverage
        working-directory: backend
        run: python -m pytest tests --cov=app --cov-report=term-missing --cov-fail-under=60

      - name: Audit backend production dependencies
        working-directory: backend
        run: python -m pip_audit -r requirements.txt

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Check frontend formatting
        working-directory: frontend
        run: npm run format:check

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Type-check frontend
        working-directory: frontend
        run: npm run type-check

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:run

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Audit frontend production dependencies
        working-directory: frontend
        run: npm run audit:prod

  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: tutor
          POSTGRES_PASSWORD: tutor
          POSTGRES_DB: tutor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tutor -d tutor"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run browser e2e against backend
        shell: bash
        env:
          DATABASE_URL: postgresql+psycopg://tutor:tutor@localhost:5432/tutor
          E2E_MOCK_LLM: "true"
          # e2e uses the deterministic hash embedding provider (no real API calls).
          RAG_EMBEDDING_MODE: hash
          RAG_HASH_EMBEDDING_DIMENSIONS: "128"
          RAG_VECTOR_DIM: "128"
        run: |
          set -euo pipefail

          cd backend
          python -m alembic upgrade head
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8001 &
          backend_pid=$!
          cd ../frontend
          VITE_API_BASE_URL="http://127.0.0.1:8001" node node_modules/vite/bin/vite.js --host 127.0.0.1 --port 4173 &
          frontend_pid=$!

          cleanup() {
            kill "$backend_pid" "$frontend_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          for i in {1..60}; do
            curl -fsS http://127.0.0.1:8001/health >/dev/null && break
            sleep 1
          done
          for i in {1..60}; do
            curl -fsS http://127.0.0.1:4173 >/dev/null && break
            sleep 1
          done

          PLAYWRIGHT_BASE_URL="http://127.0.0.1:4173" VITE_API_BASE_URL="http://127.0.0.1:8001" npm run e2e
